services:
  forgegpu-api:
    container_name: forgegpu-api
    build:
      context: .
      dockerfile: ForgeGPU.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      Infrastructure__Runtime__QueueProvider: ${INFRASTRUCTURE_QUEUE_PROVIDER:-InMemory}
      Infrastructure__Runtime__JobStoreProvider: ${INFRASTRUCTURE_JOBSTORE_PROVIDER:-InMemory}
      Infrastructure__Redis__ConnectionString: ${REDIS_CONNECTION_STRING:-forgegpu-redis:6379}
      Infrastructure__Postgres__ConnectionString: ${POSTGRES_CONNECTION_STRING:-Host=forgegpu-postgres;Port=5432;Database=forgegpu;Username=forgegpu;Password=forgegpu}
    ports:
      - "8080:8080"
    depends_on:
      forgegpu-redis:
        condition: service_healthy
      forgegpu-postgres:
        condition: service_healthy
    restart: unless-stopped

  forgegpu-redis:
    container_name: forgegpu-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    restart: unless-stopped

  forgegpu-postgres:
    container_name: forgegpu-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forgegpu}
      POSTGRES_USER: ${POSTGRES_USER:-forgegpu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forgegpu}
    ports:
      - "5432:5432"
    volumes:
      - forgegpu-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forgegpu} -d ${POSTGRES_DB:-forgegpu}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  forgegpu-postgres-data:
    name: forgegpu-postgres-data
