services:
  forgegpu-api:
    container_name: forgegpu-api
    build:
      context: .
      dockerfile: ForgeGPU.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      Infrastructure__Runtime__QueueProvider: ${INFRASTRUCTURE_QUEUE_PROVIDER:-Redis}
      Infrastructure__Runtime__JobStoreProvider: ${INFRASTRUCTURE_JOBSTORE_PROVIDER:-Postgres}
      Infrastructure__Redis__ConnectionString: ${REDIS_CONNECTION_STRING:-forgegpu-redis:6379}
      Infrastructure__Redis__QueueName: ${REDIS_QUEUE_NAME:-forgegpu:inference:jobs:queue}
      Infrastructure__Redis__MachineProjectionKeyPrefix: ${REDIS_MACHINE_PROJECTION_KEY_PREFIX:-forgegpu:machines:live:}
      Infrastructure__Postgres__ConnectionString: ${POSTGRES_CONNECTION_STRING:-Host=forgegpu-postgres;Port=5432;Database=forgegpu;Username=forgegpu;Password=forgegpu}
      Infrastructure__WorkerExecution__WorkerCount: ${WORKER_COUNT:-3}
      Infrastructure__WorkerExecution__MaxConcurrentJobsPerWorker: ${MAX_CONCURRENT_JOBS_PER_WORKER:-1}
      Infrastructure__WorkerExecution__HeartbeatIntervalSeconds: ${WORKER_HEARTBEAT_INTERVAL_SECONDS:-5}
      Infrastructure__WorkerExecution__HeartbeatTtlSeconds: ${WORKER_HEARTBEAT_TTL_SECONDS:-15}
      Infrastructure__WorkerExecution__SchedulerPolicy: ${WORKER_SCHEDULER_POLICY:-ResourceAwareBestFit}
      Infrastructure__Scheduling__DefaultModel: ${DEFAULT_MODEL:-gpt-sim-a}
      Infrastructure__Scheduling__DefaultRequiredMemoryMb: ${DEFAULT_REQUIRED_MEMORY_MB:-4096}
      Infrastructure__Scheduling__DeferRetryDelayMs: ${DEFER_RETRY_DELAY_MS:-250}
      Infrastructure__Batching__Enabled: ${BATCHING_ENABLED:-true}
      Infrastructure__Batching__BatchWindowMs: ${BATCH_WINDOW_MS:-50}
      Infrastructure__Batching__MaxBatchSize: ${MAX_BATCH_SIZE:-4}
      Infrastructure__Batching__MaxBatchMemoryMb: ${MAX_BATCH_MEMORY_MB:-16384}
      Infrastructure__Reliability__MaxRetries: ${MAX_RETRIES:-2}
      Infrastructure__Reliability__ExecutionTimeoutMs: ${EXECUTION_TIMEOUT_MS:-2500}
      Infrastructure__Reliability__RetryDelayMs: ${RETRY_DELAY_MS:-500}
    ports:
      - "8080:8080"
    depends_on:
      forgegpu-redis:
        condition: service_healthy
      forgegpu-postgres:
        condition: service_healthy
    restart: unless-stopped

  forgegpu-redis:
    container_name: forgegpu-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    restart: unless-stopped

  forgegpu-postgres:
    container_name: forgegpu-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forgegpu}
      POSTGRES_USER: ${POSTGRES_USER:-forgegpu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forgegpu}
    ports:
      - "5432:5432"
    volumes:
      - forgegpu-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forgegpu} -d ${POSTGRES_DB:-forgegpu}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  forgegpu-postgres-data:
    name: forgegpu-postgres-data
